# Scheduled knowledge-corpus builder (SPEC-SYNC-KNOWLEDGE §9).
# Fetch → emit cce.knowledge/v1 NDJSON → index (redacts) → push the corpus.
#
# A builder job pushing to the dumb cache — NOT a serving process. Nothing
# serves knowledge at runtime; consumers pull from git like every other
# artifact. Copy this to `.github/workflows/cce-knowledge-sync.yml` in the
# repo that owns your adapter, set the two secrets (see the credential note
# at the bottom), and replace the generic placeholders (`acme/cce-cache`,
# `internal-tickets`, `./adapter/fetch-and-emit`) with your own.
name: cce-knowledge-sync

on:
  schedule:
    - cron: "0 3 * * *"          # nightly; the corpus re-snapshots per run
  workflow_dispatch: {}

concurrency:
  group: cce-knowledge-sync
  cancel-in-progress: false

jobs:
  build-and-push-corpus:
    runs-on: ubuntu-latest
    steps:
      - name: Install git-LFS + the cce binary
        run: |
          sudo apt-get update && sudo apt-get install -y git-lfs
          git lfs install
          cargo install --git https://github.com/davidslv/cce-rust --tag vX.Y.Z

      - name: Configure git identity for the cache working clone
        run: |
          git config --global user.name  "cce-ci"
          git config --global user.email "cce-ci@users.noreply.github.com"

      - name: Fetch and emit the contract (the adapter — YOUR code)
        env:
          SOURCE_TOKEN: ${{ secrets.KNOWLEDGE_SOURCE_TOKEN }}
        # Any program that emits cce.knowledge/v1 NDJSON. The adapter owns
        # curation: drop wontfix/low-signal records, pre-scrub org PII (§4.6).
        run: ./adapter/fetch-and-emit > corpus.jsonl

      - name: Index (redacts at index time, before anything leaves this job)
        run: |
          mkdir -p corpus-root
          cce knowledge index corpus.jsonl --dir corpus-root

      - name: Push the corpus
        env:
          # WRITE access to the CACHE repo only — never the source tool.
          CCE_SYNC_TOKEN: ${{ secrets.CCE_SYNC_TOKEN }}
        run: |
          # `corpus-root` is a plain directory, not a git checkout, and
          # `cce knowledge push` advances the corpus `current` (snapshot)
          # pointer — NOT a git `refs/<branch>` pointer — so it is unaffected by
          # the detached-HEAD push guard (#151); no `sync.ref` is needed here.
          # (Only a code `cce sync push` from a detached checkout requires
          # `sync.ref: <branch>` in .cce/config — see docs/ci/cce-sync.yml.)
          cd corpus-root
          cce sync init \
            --remote "https://x-access-token:${CCE_SYNC_TOKEN}@github.com/acme/cce-cache.git"
          cce knowledge push --corpus internal-tickets

# The feed (corpus.jsonl) is ephemeral builder input: it is never committed,
# uploaded, or cached (§4.6) — only the redacted store travels.
#
# Multi-source corpora (the §5 push guard, #90): a job that builds from only a
# SUBSET of a corpus's feed sources would drop the other sources' records on
# push — the guard refuses such a shrink. Either make this job the corpus's
# sole publisher (emit the full superset feed here), or run
# `cce knowledge push --dry-run` first and treat a non-empty `removed` list as
# a build error. `--force` is the manual, intentional-shrink override only.
#
# ---------------------------------------------------------------------------
# Credential note (SPEC-SYNC §6/§7, plus the §9 addition)
# ---------------------------------------------------------------------------
# Two secrets with DISJOINT scopes:
#   - KNOWLEDGE_SOURCE_TOKEN — READ access to the source tool (the ticket
#     system, wiki, …) that the adapter fetches from. Never the cache.
#   - CCE_SYNC_TOKEN — WRITE access to the *cache* repository only
#     (e.g. acme/cce-cache), never the source tool and never the source repo.
# Read access to the cache repo == the audience allowed to pull the corpus:
# a corpus whose audience differs from the code beside it belongs in its own
# cache repo, wired via `knowledge.sync.remote` (SPEC-SYNC-KNOWLEDGE §4.3).
