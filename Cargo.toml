[package]
name = "cce"
version = "1.1.0"
edition = "2021"
description = "Code Context Engine — clean-room Rust implementation (SPEC v1.0 + Dashboard v1.1)"
license = "MIT"

[[bin]]
name = "cce"
path = "src/main.rs"

[lib]
name = "cce"
path = "src/lib.rs"

[dependencies]
tree-sitter = "=0.26.10"
tree-sitter-python = "=0.25.0"
tree-sitter-javascript = "=0.25.0"
sha2 = "=0.11.0"
walkdir = "=2.5.0"
clap = { version = "=4.6.1", features = ["derive"] }
ureq = { version = "=3.3.0", features = ["json"] }
serde = { version = "=1.0.228", features = ["derive"] }
serde_json = "=1.0.150"

[profile.release]
opt-level = 3

[dev-dependencies]
tempfile = "=3.24.0"
