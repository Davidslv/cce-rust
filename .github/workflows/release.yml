name: Release

# Tag-driven releases: push a `vX.Y.Z` tag and this workflow
#   1. re-runs the full CI gates (fmt, clippy, tests) on the tagged commit,
#   2. asserts the tag matches Cargo.toml's version,
#   3. builds release binaries for macOS (arm64, x86_64) and Linux (x86_64, arm64),
#   4. publishes a GitHub Release with the CHANGELOG section as notes,
#      the tarballs, and a SHA256SUMS file.
#
# The release process is documented in RELEASING.md.

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

permissions:
  contents: write

jobs:
  verify:
    name: verify (gates + tag/version match)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-stable-${{ hashFiles('**/Cargo.lock') }}

      - name: Tag matches Cargo.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version="$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)"
          if [ "$tag" != "$version" ]; then
            echo "::error::tag v$tag does not match Cargo.toml version $version"
            exit 1
          fi

      - name: CHANGELOG has a section for this version
        run: |
          version="${GITHUB_REF_NAME#v}"
          grep -q "^## \[$version\]" CHANGELOG.md || {
            echo "::error::CHANGELOG.md has no '## [$version]' section"
            exit 1
          }

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all-targets --all-features

  build:
    name: build (${{ matrix.target }})
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          # GitHub retired the Intel macOS runners (macos-13); cross-compile the
          # Intel binary on Apple Silicon instead (clang handles -arch x86_64).
          - os: macos-14
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          version="${GITHUB_REF_NAME#v}"
          name="cce-v${version}-${{ matrix.target }}"
          mkdir "$name"
          cp "target/${{ matrix.target }}/release/cce" "$name/"
          cp LICENSE README.md CHANGELOG.md "$name/"
          tar czf "$name.tar.gz" "$name"
          shasum -a 256 "$name.tar.gz" > "$name.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: cce-${{ matrix.target }}
          path: |
            cce-v*.tar.gz
            cce-v*.tar.gz.sha256
          if-no-files-found: error

  release:
    name: publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Combined SHA256SUMS
        run: |
          cd dist
          cat -- *.sha256 > SHA256SUMS
          rm -- *.sha256

      - name: Release notes from CHANGELOG
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { on = 1; next }
            on && /^## \[/ { exit }
            on { print }
          ' CHANGELOG.md > notes.md
          # Trim leading blank lines so the release body starts on content.
          sed -i '/./,$!d' notes.md
          echo "--- release notes ---"; cat notes.md

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "cce $GITHUB_REF_NAME" \
            --notes-file notes.md \
            --verify-tag \
            dist/*
